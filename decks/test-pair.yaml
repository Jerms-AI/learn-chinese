deck:
  id: test-pair
  title: Quick Test — 2 Phrases (Pimsleur-style)
  source: hand-curated for AI/UX testing
pairs:
  - id: test-001
    q:
      hanzi: 你会说普通话吗？
      pinyin: nǐ huì shuō pǔtōnghuà ma?
      english: Do you speak Mandarin?
    a:
      hanzi: 是，我会说一点儿普通话。
      pinyin: shì, wǒ huì shuō yìdiǎnr pǔtōnghuà.
      english: Yes, I speak a little Mandarin.
    tags: [test, language]

  - id: test-002
    q:
      hanzi: 你想吃一点儿东西吗？
      pinyin: nǐ xiǎng chī yìdiǎnr dōngxi ma?
      english: Do you want to eat a little something?
    a:
      hanzi: 是，我想吃一点儿东西。
      pinyin: shì, wǒ xiǎng chī yìdiǎnr dōngxi.
      english: Yes, I want to eat a little something.
    tags: [test, food]
